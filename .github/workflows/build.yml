name: build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 26
        run: |
          for xcode in \
            /Applications/Xcode_26.3.app \
            /Applications/Xcode_26.2.app \
            /Applications/Xcode_26.1.1.app \
            /Applications/Xcode_26.0.1.app; do
            if [ -d "$xcode" ]; then
              sudo xcode-select -s "$xcode/Contents/Developer"
              xcodebuild -version
              exit 0
            fi
          done

          echo "No Xcode 26 installation found"
          exit 1

      - name: Build Swift package for iPhoneOS
        run: |
          SDKROOT="$(xcrun --sdk iphoneos --show-sdk-path)"
          swift build \
            --triple arm64-apple-ios13.0 \
            --build-path .build/iphoneos \
            -Xswiftc -sdk -Xswiftc "$SDKROOT" \
            -Xcc -isysroot -Xcc "$SDKROOT" \
            -Xlinker -syslibroot -Xlinker "$SDKROOT"

      - name: Build Swift package for iPhone Simulator
        run: |
          SDKROOT="$(xcrun --sdk iphonesimulator --show-sdk-path)"
          swift build \
            --triple arm64-apple-ios13.0-simulator \
            --build-path .build/iphonesimulator \
            -Xswiftc -sdk -Xswiftc "$SDKROOT" \
            -Xcc -isysroot -Xcc "$SDKROOT" \
            -Xlinker -syslibroot -Xlinker "$SDKROOT"
